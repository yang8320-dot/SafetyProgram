name: Build MiniImageStudio

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore MiniImageStudio/MiniImageStudio.csproj

    - name: Build Project
      # 移除了容易造成路徑錯亂的 Platform 參數，使用預設值即可
      run: msbuild MiniImageStudio/MiniImageStudio.csproj /p:Configuration=Release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MiniImageStudio-Portable
        # 使用 ** 萬用字元，不管 MSBuild 把它藏在 bin 的哪一層，都會自動找出來上傳！
        path: MiniImageStudio/bin/Release/**/MiniImageStudio.exe
