name: Build MiniImageStudio

# 這裡改為 workflow_dispatch，代表允許從 GitHub 介面手動觸發
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore MiniImageStudio.sln

    - name: Build Solution
      run: msbuild MiniImageStudio.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Download ILRepack
      run: nuget install ILRepack -Version 2.0.18 -OutputDirectory tools

    - name: Merge to Single EXE
      run: |
        $ilrepack = (Get-ChildItem -Path tools -Filter ILRepack.exe -Recurse).FullName
        & $ilrepack /out:bin\Release\MiniImageStudio_Portable.exe bin\Release\MiniImageStudio.exe
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MiniImageStudio-Portable
        path: bin\Release\MiniImageStudio_Portable.exe
