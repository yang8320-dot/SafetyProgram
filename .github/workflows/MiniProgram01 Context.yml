name: 打包 MiniProgram01 Context

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Debug - List all folders
        run: |
          echo "=== 當前目錄下的所有資料夾 ==="
          find . -type d -not -path "*/\.git/*"
          echo "==============================="

      - name: Create and Run Context Generator
        run: |
          cat << 'EOF' > generate_context.py
          import os

          # 目標資料夾路徑
          TARGET_DIR = './MiniProgram01'
          
          valid_extensions = ('.cs', '.csproj', '.config', '.md', '.txt')
          exclude_dirs = {'bin', 'obj', '.git', '.vs', 'packages', 'TestResults'}

          if not os.path.exists(TARGET_DIR):
              print(f"錯誤：找不到 {TARGET_DIR} 資料夾！")
              print("請往上看 'Debug - List all folders' 步驟的輸出，確認正確的路徑名稱。")
              exit(1)

          file_paths = []
          full_content = []

          for root, dirs, files in os.walk(TARGET_DIR):
              dirs[:] = [d for d in dirs if d not in exclude_dirs]
              for file in files:
                  if file.lower().endswith(valid_extensions):
                      if file in ['0_project_tree.txt', 'project_context_all.txt']: continue
                      file_path = os.path.join(root, file)
                      rel_path = os.path.relpath(file_path, '.')
                      file_paths.append(rel_path)
                      try:
                          with open(file_path, 'r', encoding='utf-8', errors='ignore') as code_f:
                              content = code_f.read()
                      except Exception as e:
                          content = f"// 無法讀取此檔案: {e}\n"
                      header = f"\n{'='*60}\n/// FILE: {rel_path} ///\n{'='*60}\n\n"
                      full_content.append(header + content + "\n")

          with open('0_project_tree.txt', 'w', encoding='utf-8') as f_tree:
              f_tree.write(f"# C# 專案檔案總覽 (總計 {len(file_paths)} 個檔案)\n\n")
              for path in sorted(file_paths):
                  f_tree.write(f"- {path}\n")

          with open('project_context_all.txt', 'w', encoding='utf-8') as f_all:
              f_all.write(f"# C# 專案完整代碼總覽\n")
              f_all.write("".join(full_content))

          print(f"成功生成目錄與完整內容，共計 {len(file_paths)} 個檔案。")
          EOF
          python generate_context.py

      - name: Upload Context Artifacts
        if: success() 
        uses: actions/upload-artifact@v4
        with:
          name: MiniProgram01-Code-Context
          path: |
            0_project_tree.txt
            project_context_all.txt
          retention-days: 7
