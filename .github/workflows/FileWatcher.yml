name: Build CSharp EXE

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 順便升級到 v4，更穩定

      - name: Compile EXE
        run: |
          # 呼叫 Windows 內建編譯器
          C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe /target:winexe /r:System.Drawing.dll /out:FileWatcher.exe FileWatcher.cs

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # 關鍵修正：升級到 v4
        with:
          name: MyCompiledProgram
          path: FileWatcher.exe
