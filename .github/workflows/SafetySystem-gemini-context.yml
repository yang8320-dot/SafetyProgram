name: Generate Safety System Context

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Create and Run Context Generator
      run: |
        cat << 'EOF' > generate_context.py
        import os

        TARGET_DIR = 'Safety_System'
        
        valid_extensions = (
            '.cs', '.csproj', '.json', '.xml', '.config', 
            '.cshtml', '.html', '.css', '.js', '.ts', 
            '.sql', '.md', '.txt', '.py', '.bat', '.sh'
        )
        
        exclude_dirs = {'bin', 'obj', '.git', '.vs', 'packages', 'TestResults', 'node_modules'}

        if not os.path.exists(TARGET_DIR):
            print(f"錯誤：找不到 {TARGET_DIR} 資料夾！")
            exit(1)

        file_data_list = []
        file_paths = [] # 用來儲存目錄清單
        total_length = 0

        for root, dirs, files in os.walk(TARGET_DIR):
            dirs[:] = [d for d in dirs if d not in exclude_dirs]
            for file in files:
                if file.lower().endswith(valid_extensions):
                    file_path = os.path.join(root, file)
                    rel_path = os.path.relpath(file_path, '.')
                    
                    file_paths.append(rel_path) # 記錄檔案路徑
                    
                    try:
                        with open(file_path, 'r', encoding='utf-8', errors='ignore') as code_f:
                            content = code_f.read()
                    except Exception as e:
                        content = f"// 無法讀取此檔案: {e}\n"
                    
                    formatted_content = f"\n{'='*50}\n/// FILE: {rel_path} ///\n{'='*50}\n\n{content}\n"
                    file_data_list.append(formatted_content)
                    total_length += len(formatted_content)

        # 1. 獨立產出一個「專案結構與目錄清單」檔案
        with open('0_project_tree.txt', 'w', encoding='utf-8') as f_tree:
            f_tree.write(f"# {TARGET_DIR} 專案檔案總覽 (總計 {len(file_paths)} 個檔案)\n\n")
            for path in sorted(file_paths):
                f_tree.write(f"- {path}\n")

        # 2. 依照長度平均切割程式碼內容 (維持分成 5 份)
        NUM_PARTS = 5
        target_size_per_part = total_length / NUM_PARTS
        
        current_part = 1
        current_size = 0
        
        f_out = open(f'project_context_part{current_part}.txt', 'w', encoding='utf-8')
        f_out.write(f"# {TARGET_DIR} 專案完整代碼 - Part {current_part} / {NUM_PARTS}\n\n")

        for data in file_data_list:
            if current_size + len(data) > target_size_per_part and current_part < NUM_PARTS and current_size > 0:
                f_out.close()
                current_part += 1
                current_size = 0
                f_out = open(f'project_context_part{current_part}.txt', 'w', encoding='utf-8')
                f_out.write(f"# {TARGET_DIR} 專案完整代碼 - Part {current_part} / {NUM_PARTS}\n\n")
            
            f_out.write(data)
            current_size += len(data)

        f_out.close()
        EOF
        python generate_context.py

    - name: Upload Context Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Safety-System-Context
        # 將目錄檔與程式碼分割檔一起打包
        path: |
          0_project_tree.txt
          project_context_part*.txt
        retention-days: 7
