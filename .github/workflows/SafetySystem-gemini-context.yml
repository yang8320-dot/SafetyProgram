name: Generate Safety System Context

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Create and Run Context Generator
      run: |
        cat << 'EOF' > generate_context.py
        import os

        # 1. 鎖定你的專案資料夾名稱
        TARGET_DIR = 'Safety_System'
        
        valid_extensions = ('.cs', '.csproj', '.json', '.xml')
        exclude_dirs = {'bin', 'obj', '.git', '.vs', 'packages', 'TestResults'}

        # 2. 檢查資料夾是否存在，避免報錯
        if not os.path.exists(TARGET_DIR):
            print(f"找不到資料夾: {TARGET_DIR}，請確認名稱大小寫是否正確。")
            exit(1)

        with open('project_context.txt', 'w', encoding='utf-8') as f:
            f.write("# Safety System 專案完整代碼上下文\n\n")
            
            # 3. 讓 os.walk 只針對 TARGET_DIR 進行掃描
            for root, dirs, files in os.walk(TARGET_DIR):
                dirs[:] = [d for d in dirs if d not in exclude_dirs]
                for file in files:
                    if file.endswith(valid_extensions):
                        file_path = os.path.join(root, file)
                        # 讓輸出的路徑包含 Safety_system/ 前綴，讓架構更清晰
                        rel_path = os.path.relpath(file_path, '.')
                        
                        f.write(f"\n{'='*50}\n")
                        f.write(f"/// FILE: {rel_path} ///\n")
                        f.write(f"{'='*50}\n\n")
                        
                        try:
                            with open(file_path, 'r', encoding='utf-8') as code_f:
                                f.write(code_f.read())
                        except Exception as e:
                            f.write(f"// 無法讀取此檔案: {e}\n")
                        f.write("\n")
        EOF
        python generate_context.py

    - name: Upload Context Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Safety-System-Context
        path: project_context.txt
        retention-days: 7
