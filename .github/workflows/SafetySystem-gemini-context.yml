name: Generate Safety System Context

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允許在 Actions 頁面手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Create and Run Context Generator
      run: |
        cat << 'EOF' > generate_context.py
        import os

        # 1. 絕對精準對齊你的大小寫
        TARGET_DIR = 'Safety_System'
        
        # 2. 擴充到「所有常見程式碼」的副檔名，確保全抓
        valid_extensions = (
            '.cs', '.csproj', '.json', '.xml', '.config', 
            '.cshtml', '.html', '.css', '.js', '.ts', 
            '.sql', '.md', '.txt', '.py', '.bat', '.sh'
        )
        
        # 3. 排除編譯產生的垃圾檔案與套件包
        exclude_dirs = {'bin', 'obj', '.git', '.vs', 'packages', 'TestResults', 'node_modules'}

        if not os.path.exists(TARGET_DIR):
            print(f"錯誤：找不到 {TARGET_DIR} 資料夾！請檢查大小寫是否完全一致。")
            exit(1)

        with open('project_context.txt', 'w', encoding='utf-8') as f:
            f.write(f"# {TARGET_DIR} 專案完整代碼上下文\n\n")
            
            for root, dirs, files in os.walk(TARGET_DIR):
                dirs[:] = [d for d in dirs if d not in exclude_dirs]
                for file in files:
                    # 強制把檔名轉小寫後比對，避免 .CS 或 .JSON 被漏掉
                    if file.lower().endswith(valid_extensions):
                        file_path = os.path.join(root, file)
                        rel_path = os.path.relpath(file_path, '.')
                        
                        f.write(f"\n{'='*50}\n")
                        f.write(f"/// FILE: {rel_path} ///\n")
                        f.write(f"{'='*50}\n\n")
                        
                        try:
                            # 加上 errors='ignore'，遇到舊版 Windows 編碼亂碼時會跳過亂碼強行讀取
                            with open(file_path, 'r', encoding='utf-8', errors='ignore') as code_f:
                                f.write(code_f.read())
                        except Exception as e:
                            f.write(f"// 無法讀取此檔案: {e}\n")
                        f.write("\n")
        EOF
        python generate_context.py

    - name: Upload Context Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Safety-System-Context
        path: project_context.txt
        retention-days: 7
