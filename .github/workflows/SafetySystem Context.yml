name: 打包 SafetySystem Context

on:
  workflow_dispatch: # 核心修正：移除 push，改為全手動觸發

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      [span_25](start_span)uses: actions/checkout@v4[span_25](end_span)

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        [span_26](start_span)python-version: '3.10'[span_26](end_span)

    - name: Create and Run Context Generator
      run: |
        cat << 'EOF' > generate_context.py
        import os

        [span_27](start_span)TARGET_DIR = 'Safety_System'[span_27](end_span)
        
        valid_extensions = (
            '.cs', '.csproj', '.json', '.xml', '.config', 
            '.cshtml', '.html', '.css', '.js', '.ts', 
            '.sql', '.md', '.txt', '.py', '.bat', '.sh'
        [span_28](start_span))
        
        exclude_dirs = {'bin', 'obj', '.git', '.vs', 'packages', 'TestResults', 'node_modules'}[span_28](end_span)

        if not os.path.exists(TARGET_DIR):
            [span_29](start_span)print(f"錯誤：找不到 {TARGET_DIR} 資料夾！")[span_29](end_span)
            exit(1)

        file_paths = []
        full_content = []

        [span_30](start_span)for root, dirs, files in os.walk(TARGET_DIR):[span_30](end_span)
            [span_31](start_span)dirs[:] = [d for d in dirs if d not in exclude_dirs][span_31](end_span)
            for file in files:
                [span_32](start_span)if file.lower().endswith(valid_extensions):[span_32](end_span)
                    [span_33](start_span)file_path = os.path.join(root, file)[span_33](end_span)
                    [span_34](start_span)rel_path = os.path.relpath(file_path, '.')[span_34](end_span)
                    [span_35](start_span)file_paths.append(rel_path)[span_35](end_span)
                    try:
                        with open(file_path, 'r', encoding='utf-8', errors='ignore') as code_f:
                            [span_36](start_span)content = code_f.read()[span_36](end_span)
                    except Exception as e:
                        [span_37](start_span)content = f"// 無法讀取此檔案: {e}\n"[span_37](end_span)
                    
                    [span_38](start_span)header = f"\n{'='*60}\n/// FILE: {rel_path} ///\n{'='*60}\n\n"[span_38](end_span)
                    [span_39](start_span)full_content.append(header + content + "\n")[span_39](end_span)

        with open('0_project_tree.txt', 'w', encoding='utf-8') as f_tree:
            [span_40](start_span)f_tree.write(f"# {TARGET_DIR} 專案檔案總覽 (總計 {len(file_paths)} 個檔案)\n\n")[span_40](end_span)
            for path in sorted(file_paths):
                [span_41](start_span)f_tree.write(f"- {path}\n")[span_41](end_span)

        with open('project_context_all.txt', 'w', encoding='utf-8') as f_all:
            [span_42](start_span)f_all.write(f"# {TARGET_DIR} 專案完整代碼總覽\n")[span_42](end_span)
            [span_43](start_span)f_all.write("".join(full_content))[span_43](end_span)

        [span_44](start_span)print(f"成功生成目錄與完整內容，共計 {len(file_paths)} 個檔案。")[span_44](end_span)
        EOF
        [span_45](start_span)python generate_context.py[span_45](end_span)

    - name: Upload Context Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Safety-System-Context
        path: |
          0_project_tree.txt
          [span_46](start_span)project_context_all.txt[span_46](end_span)
        [span_47](start_span)retention-days: 7[span_47](end_span)
