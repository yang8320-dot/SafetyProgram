name: Safety_System

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    # 🟢 修正重點：加入環境變數以消除 Node.js 20 棄用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: ./Safety_System

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Release
      run: dotnet build -c Release -o ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Safety_System-Complete-Package
        # 打包整個 publish 資料夾，包含 DLL 檔
        path: ./Safety_System/publish/
