name: Safety_System

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ./Safety_System

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # 雖然跑 4.7.2，但編譯工具仍建議用最新 SDK

    - name: Build EXE
      # .NET Framework 編譯簡單指令
      run: dotnet build -c Release -o ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Safety_System-v4.7.2-EXE
        # 此模式產出的檔案會在 publish 資料夾下，體積會非常小 (通常 < 500KB)
        path: ./Safety_System/publish/Safety_System.exe
