name: Safety_System

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    # 指定在子資料夾中執行指令
    defaults:
      run:
        working-directory: ./Safety_System

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Publish Single File
      # 編譯成免安裝單一執行檔
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Safety_System-EXE
        path: ./Safety_System/publish/Safety_System.exe
