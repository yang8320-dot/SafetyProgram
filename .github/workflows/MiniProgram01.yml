name: Build MiniProgram01

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # 【升級到 v4】

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2  # 【升級到 v2】

      - name: Compile C# Multi-Files
        run: |
          cd MiniProgram01
          csc.exe /target:winexe /out:MiniProgram01.exe /optimize+ /win32icon:NONE *.cs

      - name: Upload EXE
        uses: actions/upload-artifact@v4  # 【升級到 v4】徹底解決報錯！
        with:
          name: MiniProgram01-App
          path: MiniProgram01/MiniProgram01.exe
