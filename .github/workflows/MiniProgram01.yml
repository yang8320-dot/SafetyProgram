name: MiniProgram01

on:
  workflow_dispatch: # 核心修正：移除 push，只保留手動觸發按鈕

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile C# Multi-Files
        # 使用 Visual Studio 2022 內建的 Roslyn 編譯器 (csc.exe)
        run: |
          cd MiniProgram01
          & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\Roslyn\csc.exe" /target:winexe /out:MiniProgram01.exe /optimize+ *.cs

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MiniProgram01-App
          path: MiniProgram01/MiniProgram01.exe
