name: MiniProgram01-MyTool

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. 取得最新程式碼
      uses: actions/checkout@v4

    - name: 2. 安裝 .NET 8.0 環境
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 3. 還原 NuGet 套件
      # 若您的 csproj 不在 MiniProgram01 內，請修改路徑
      run: dotnet restore MiniProgram01/MyTool.csproj

    - name: 4. 編譯真正的程式到 system 資料夾
      # 將主程式與所有 DLL 打包到 publish_output/system 中
      run: >
        dotnet publish MiniProgram01/MyTool.csproj
        -c Release
        -r win-x64
        --self-contained true
        -p:PublishSingleFile=false
        -o ./publish_output/system

    - name: 5. 自動生成極速啟動器 (Launcher)
      # 利用腳本自動寫一個 10KB 的引導程式，放在外層
      run: |
        mkdir Launcher
        
        # 建立微型專案 (採用 Windows 內建的 .NET 4.7.2 確保體積極小且秒開)
        echo '<Project Sdk="Microsoft.NET.Sdk"><PropertyGroup><OutputType>WinExe</OutputType><TargetFramework>net472</TargetFramework><AssemblyName>MyTool</AssemblyName></PropertyGroup></Project>' > Launcher/Launcher.csproj
        
        # 建立啟動器程式碼 (呼叫 system/MyTool.exe 並將工作目錄設為 system)
        echo 'using System.Diagnostics; using System.IO; using System.Reflection; class Program { static void Main(string[] args) { string baseDir = Path.GetDirectoryName(Assembly.GetExecutingAssembly().Location); string target = Path.Combine(baseDir, "system", "MyTool.exe"); if (File.Exists(target)) { ProcessStartInfo info = new ProcessStartInfo { FileName = target, WorkingDirectory = Path.Combine(baseDir, "system"), Arguments = string.Join(" ", args) }; Process.Start(info); } } }' > Launcher/Program.cs
        
        # 編譯啟動器並放入外層資料夾
        dotnet build Launcher/Launcher.csproj -c Release -o ./publish_output

    - name: 6. 刪除啟動器產生時的多餘檔案 (保持根目錄乾淨)
      run: |
        del ./publish_output/MyTool.exe.config
        del ./publish_output/MyTool.pdb

    - name: 7. 將發布檔案壓縮成 ZIP
      # 壓縮成果，此時結構為： 外層有 MyTool.exe，內層有一個 system 資料夾
      run: Compress-Archive -Path ./publish_output/* -DestinationPath MyTool_Release_Clean.zip

    - name: 8. 上傳 ZIP 讓您可以下載
      uses: actions/upload-artifact@v4
      with:
        name: MyTool-Clean-Artifact
        path: MyTool_Release_Clean.zip
        retention-days: 30
