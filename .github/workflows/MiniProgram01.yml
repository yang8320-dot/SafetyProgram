name: MiniProgram01-Build

on:
  workflow_dispatch: # 手動觸發按鈕

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 設定 .NET 環境以執行 dotnet publish
      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Compile and Bundle SQLite
        # 核心修正：進入 MiniProgram01 目錄並使用 MyTool.csproj 進行打包
        run: |
          cd MiniProgram01
          dotnet publish MyTool.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ../PublishOutput

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MyTool-Portable-App
          # 上傳編譯後產出的 MyTool.exe
          path: PublishOutput/MyTool.exe
