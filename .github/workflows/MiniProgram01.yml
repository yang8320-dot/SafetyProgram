name: MiniProgram01

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile C# Multi-Files
        # 【核心修正】改用 Visual Studio 2022 內建的現代編譯器 (Roslyn)
        run: |
          cd MiniProgram01
          & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\Roslyn\csc.exe" /target:winexe /out:MiniProgram01.exe /optimize+ *.cs

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MiniProgram01-App
          path: MiniProgram01/MiniProgram01.exe
